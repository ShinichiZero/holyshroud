<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Pagina non trovata · Santa Sindone</title>

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob:;
    connect-src 'self';
    require-trusted-types-for 'script';
    trusted-types shroud-policy;
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/animations.css">
</head>
<body>

  <main class="error-page">
    <div class="error-icon">
      <svg viewBox="0 0 30 46" aria-hidden="true">
        <rect x="11" y="0" width="8" height="46" fill="currentColor"/>
        <rect x="0" y="12" width="30" height="8" fill="currentColor"/>
      </svg>
    </div>
    <div class="error-code" data-i18n="error.code">404</div>
    <h1 data-i18n="error.title">Pagina non trovata</h1>
    <hr>
    <p data-i18n="error.text" style="color: var(--color-ash); max-width: 45ch; margin-bottom: var(--space-8);">La pagina che cerchi non esiste o è stata spostata.</p>
    <a href="./index.html" class="btn" data-i18n="error.back">Torna alla Home</a>
  </main>

  <!-- Scripts -->
  <script src="./js/trustedTypes.js"></script>
  <script src="./js/i18n.js" defer></script>
</body>
</html>

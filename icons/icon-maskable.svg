<!-- Maskable icon: safe zone is centre 80% (410×410 of 512×512) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full bleed background (fills mask shape) -->
  <rect width="512" height="512" fill="#0A0A0A"/>
  <!-- Decorative corner fills -->
  <rect width="512" height="512" fill="#0D0B08"/>
  <!-- Shroud cloth — entirely within safe zone -->
  <rect x="196" y="80" width="120" height="352" rx="14" fill="#1A1410" stroke="#D4AF37" stroke-width="2.5"/>
  <!-- Cross — entirely within safe zone -->
  <rect x="240" y="96"  width="32" height="320" rx="4" fill="#D4AF37"/>
  <rect x="164" y="200" width="184" height="32"  rx="4" fill="#D4AF37"/>
</svg>

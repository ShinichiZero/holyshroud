<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="32" fill="#0A0A0A"/>
  <!-- Shroud cloth outline -->
  <rect x="176" y="32" width="160" height="448" rx="20" fill="#1A1410" stroke="#D4AF37" stroke-width="3"/>
  <!-- Cross -->
  <rect x="232" y="64"  width="48" height="384" rx="6" fill="#D4AF37"/>
  <rect x="128" y="192" width="256" height="48"  rx="6" fill="#D4AF37"/>
  <!-- Glow effect -->
  <defs>
    <radialGradient id="iconglow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="176" y="32" width="160" height="448" rx="20" fill="url(#iconglow)"/>
</svg>
